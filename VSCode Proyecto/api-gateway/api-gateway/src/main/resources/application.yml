server:
  port: 8081 # El puerto del guardia de seguridad

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Ruta para el Catálogo
        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/catalogo/**

        # 2. Ruta para el Inventario
        - id: inventory-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/inventario/**

        # 3. Ruta para Ventas
        - id: sales-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/ventas/**

        # 4. Ruta para Compras
        - id: purchasing-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/compras/**

        # 5. Ruta para Analítica
        - id: analytics-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/analitica/**